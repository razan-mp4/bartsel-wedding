name: Deploy Bartsel Wedding

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Run deploy script on server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: 109.123.244.12
          username: root
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            /var/www/bartsel-wedding/scripts/deploy.sh
